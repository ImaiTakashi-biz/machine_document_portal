<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="{{ pwa_theme_color }}">
  <title>{{ machine.machine_id }}_{{ machine.part_number }}_加工図面 | {{ app_name }}</title>
  {% include "includes/pwa_head.html" %}
  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
  <script defer src="{{ url_for('static', path='/js/app.js') }}"></script>
</head>
<body class="drawing-viewer-page">
  <main class="drawing-viewer" aria-label="{{ machine.machine_id }} {{ machine.part_number }} 加工図面">
    <header class="drawing-viewer-header">
      <div>
        <p class="drawing-viewer-eyebrow">MACHINE DOCUMENT PORTAL</p>
        <h1>{{ machine.machine_id }}_{{ machine.part_number }}_加工図面</h1>
      </div>
      <div class="drawing-viewer-controls" aria-label="図面の拡大縮小">
        <button class="btn" type="button" data-drawing-viewer-zoom-out>縮小</button>
        <button class="btn" type="button" data-drawing-viewer-zoom-reset>100%</button>
        <button class="btn btn-primary" type="button" data-drawing-viewer-zoom-in>拡大</button>
      </div>
    </header>
    <div class="drawing-viewer-body">
      <img
        class="drawing-viewer-image"
        src="{{ preview_url }}"
        alt="{{ machine.machine_id }} {{ machine.part_number }} 加工図面"
        data-drawing-viewer-image
      >
    </div>
  </main>
</body>
</html>
